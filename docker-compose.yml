version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financebot-rag-api
    ports:
      - "8001:8000"   # Puerto 8001 en el host para no colisionar con el Proyecto 1
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - MAX_TOKENS=${MAX_TOKENS:-2048}
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - RETRIEVER_K=${RETRIEVER_K:-4}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-financebot-rag}
      - PINECONE_NAMESPACE=${PINECONE_NAMESPACE:-financial_docs}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
