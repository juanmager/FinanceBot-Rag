# ──────────────────────────────────────────────────────────────────────────────
# CI — FinanceBot RAG
# ──────────────────────────────────────────────────────────────────────────────
# Pipeline: Lint → Tests (con coverage) → Docker Build
# Se dispara en cada push/PR a main y develop.
#
# NOTA: Los tests mockean IngestService y RAGService completamente.
#       No se descarga ningún modelo de embeddings ni se llama a Gemini en CI.
# ──────────────────────────────────────────────────────────────────────────────

name: CI — FinanceBot RAG

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Linting con ruff ─────────────────────────────────────────────────
  lint:
    name: 🔍 Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar ruff
        run: pip install ruff

      - name: Verificar estilo de código
        run: ruff check app/ tests/ --output-format=github

  # ── Job 2: Tests con cobertura ──────────────────────────────────────────────
  test:
    name: 🧪 Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint

    env:
      # Los tests usan mocks — no se realizan llamadas reales a la API
      GOOGLE_API_KEY: ci-fake-key-tests-use-mocks
      PINECONE_API_KEY: ci-fake-pinecone-key
      PINECONE_INDEX_NAME: ci-fake-index
      PINECONE_NAMESPACE: ci-fake-namespace
      # Evitar que transformers intente cargar TensorFlow (no instalado en CI)
      TRANSFORMERS_NO_TF: "1"
      USE_TF: "0"

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Ejecutar tests con cobertura
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75

      - name: Publicar resumen de cobertura
        if: always()
        run: |
          echo "## 📊 Cobertura de tests — FinanceBot RAG" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pytest tests/ --cov=app --cov-report=term-missing --no-header -q 2>&1 | tail -25 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-financebot-rag
          path: coverage.xml

  # ── Job 3: Docker Build ─────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t financebot-rag:ci .
